name: Deploy to Fly.io

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    concurrency: deploy-production

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # Warm the SSR server so the first human request doesn't pay
      # cold-start module loading after the machine restarts.
      - name: Warm up
        run: |
          sleep 5
          for path in / /listings/ /admin/login /admin/insights; do
            curl -s -o /dev/null -w "warm $path -> %{http_code} (%{time_total}s)\n" \
              --max-time 30 "https://landcruisersa.co.za$path" || true
          done
