name: Deploy to Fly.io

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    concurrency: deploy-production

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Build the image HERE in the GitHub runner (US, effectively unlimited
      # capacity) and push the finished image to Fly's registry, rather than
      # asking Fly's remote builder — which lives in our jnb region and went
      # down in the 2026-07-22 outage, blocking every deploy. `--local-only`
      # uses the runner's own Docker daemon (ubuntu-latest ships it); the
      # release step still updates the existing jnb machine in place.
      - name: Deploy
        run: flyctl deploy --local-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # Post-deploy smoke check + warm-up. The DB-backed pages (/ and /listings/)
      # MUST return 200 or the run fails loudly — the guard against the 2026-07-03
      # outage class: code shipped referencing a column the prod DB didn't have,
      # migrate exited clean, static guide pages stayed 200, but every SSR page
      # 500'd and nothing noticed. Retries ride out the ~45s machine swap.
      - name: Smoke check + warm up
        run: |
          check() {
            local path="$1" code=000
            for i in $(seq 1 8); do
              code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "https://landcruisersa.co.za$path" || echo 000)
              echo "smoke $path attempt $i -> $code"
              [ "$code" = "200" ] && return 0
              sleep 10
            done
            echo "::error::SMOKE CHECK FAILED: $path returned $code after 8 attempts — the site is likely down"
            return 1
          }
          # Critical, DB-backed routes — a failure here fails the deploy run.
          check /
          check /listings/
          # Warm-only (never fail): cold-start the rest of the SSR surface.
          for path in /admin/login /admin/insights /valuation/; do
            curl -s -o /dev/null -w "warm $path -> %{http_code} (%{time_total}s)\n" \
              --max-time 30 "https://landcruisersa.co.za$path" || true
          done
