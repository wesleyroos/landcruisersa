name: Poll Liveness

on:
  schedule:
    - cron: '30 */6 * * *'  # every 6 hours, offset from ingest
  workflow_dispatch:

jobs:
  poll:
    name: Check Liveness
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Poll listing liveness
        run: node --experimental-strip-types src/scripts/poll-liveness.ts
        env:
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
