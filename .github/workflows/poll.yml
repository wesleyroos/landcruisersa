name: Poll Liveness

on:
  schedule:
    - cron: '30 */6 * * *'  # every 6 hours, offset from ingest
  workflow_dispatch:

jobs:
  poll:
    name: Check Liveness
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Poll listing liveness (Land Cruiser SA)
        run: node --experimental-strip-types src/scripts/poll-liveness.ts
        env:
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          # AutoTrader is reconciled at ingest (it can't be liveness-polled); cap the
          # rest so the poll finishes well under the 30-min timeout.
          POLL_SKIP: autotrader
          POLL_CAP: '800'

      # Same script, pointed at the Jimny site (separate DB) — mirrors how ingest
      # splits per segment. always() so a hiccup in the LC pass can't skip Jimny.
      - name: Poll listing liveness (Jimny SA)
        if: always()
        run: node --experimental-strip-types src/scripts/poll-liveness.ts
        env:
          SCRAPE_SEGMENT: jimny
          INGEST_TOKEN: ${{ secrets.JIMNY_INGEST_TOKEN }}
          SITE_URL: ${{ secrets.JIMNY_SITE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          POLL_SKIP: autotrader
          POLL_CAP: '800'
