name: Ingest Listings

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours
  workflow_dispatch:

jobs:
  ingest:
    name: Scrape & Ingest
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # AutoTrader blocks datacenter IPs (every GHA run fails with fetch errors) —
      # it runs from the local launchd schedule instead, alongside cars.co.za.

      - name: Run WeBuyCars ingest
        continue-on-error: true
        run: node --experimental-strip-types src/scripts/ingest-wbc.ts
        env:
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

      - name: Run Adios ingest
        continue-on-error: true
        run: node --experimental-strip-types src/scripts/ingest-adios.ts
        env:
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

      - name: Run WeBuy Bakkies ingest
        continue-on-error: true
        run: node --experimental-strip-types src/scripts/ingest-wbb.ts
        env:
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}

      - name: Backfill missing descriptions
        continue-on-error: true
        run: node --experimental-strip-types src/scripts/backfill-descriptions.ts
        env:
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
