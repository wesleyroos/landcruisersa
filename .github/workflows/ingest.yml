name: Ingest Listings

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours
  workflow_dispatch:

jobs:
  ingest:
    name: Scrape & Ingest
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # AutoTrader runs in its own workflow (autotrader.yml) via the residential
      # proxy. cars.co.za runs on the local Mac (Cloudflare). This workflow is the
      # datacenter-friendly sources only.

      - name: Run WeBuyCars ingest
        continue-on-error: true
        run: node --experimental-strip-types src/scripts/ingest-wbc.ts
        env:
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

      - name: Run Adios ingest
        continue-on-error: true
        run: node --experimental-strip-types src/scripts/ingest-adios.ts
        env:
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

      - name: Run WeBuy Bakkies ingest
        continue-on-error: true
        run: node --experimental-strip-types src/scripts/ingest-wbb.ts
        env:
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}

      - name: Run Vintage Cars SA ingest
        continue-on-error: true
        run: node --experimental-strip-types src/scripts/ingest-vcsa.ts
        env:
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
