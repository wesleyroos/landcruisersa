app = "landcruisersa"
primary_region = "jnb"
org = "landcruiser-sa"

[build]

[env]
  PORT = "8080"
  HOST = "0.0.0.0"
  NODE_ENV = "production"
  DATABASE_PATH = "/data/db.sqlite"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[[mounts]]
  source = "landcruisersa_data"
  destination = "/data"
  initial_size = "1gb"
